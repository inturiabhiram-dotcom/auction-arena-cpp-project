{% extends "admin_home.html" %}

{% block content %}
<div style="max-width:760px;">
  <div class="page-header">
    <div>
      <div class="page-subtitle">Admin / Auctions</div>
      <h1 class="page-title">{% if item_obj %}Edit Auction Item{% else %}Add Auction Item{% endif %}</h1>
    </div>
  </div>

  <div style="background:var(--warm-white); border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:var(--shadow-sm);">

    <!-- Form Header -->
    <div style="padding:20px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; background:var(--cream);">
      <div style="width:38px; height:38px; background:var(--navy); border-radius:9px; display:flex; align-items:center; justify-content:center; color:#fff;">
        <i class="bx bx-package" style="font-size:18px;"></i>
      </div>
      <div>
        <div style="font-size:14px; font-weight:600; color:var(--text-dark);">Item Details</div>
        <div style="font-size:12px; color:var(--text-light);">Fill in all fields below to list an item</div>
      </div>
    </div>

    <div style="padding:36px;">
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
          <div>
            <label style="display:block; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-mid); margin-bottom:8px;">Owner Name</label>
            <input
              type="text"
              name="ownername"
              value="{% if item_obj and item_obj.owner_name %}{{ item_obj.owner_name }}{% endif %}"
              placeholder="Enter owner name"
              autofocus required
              style="width:100%; background:var(--cream); border:1.5px solid var(--border); border-radius:9px; padding:11px 14px; color:var(--text-dark); font-family:'Inter',sans-serif; font-size:13.5px; outline:none; transition:all 0.2s;"
              onfocus="this.style.borderColor='var(--navy)'; this.style.background='#fff'; this.style.boxShadow='0 0 0 3px rgba(15,32,68,0.06)'"
              onblur="this.style.borderColor='var(--border)'; this.style.background='var(--cream)'; this.style.boxShadow='none'"
            >
          </div>

          <div>
            <label style="display:block; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-mid); margin-bottom:8px;">Item Name</label>
            <input
              type="text"
              name="itemname"
              value="{% if item_obj and item_obj.item_name %}{{ item_obj.item_name }}{% endif %}"
              placeholder="Enter item name"
              required
              style="width:100%; background:var(--cream); border:1.5px solid var(--border); border-radius:9px; padding:11px 14px; color:var(--text-dark); font-family:'Inter',sans-serif; font-size:13.5px; outline:none; transition:all 0.2s;"
              onfocus="this.style.borderColor='var(--navy)'; this.style.background='#fff'; this.style.boxShadow='0 0 0 3px rgba(15,32,68,0.06)'"
              onblur="this.style.borderColor='var(--border)'; this.style.background='var(--cream)'; this.style.boxShadow='none'"
            >
          </div>
        </div>

        <div style="margin-top:20px;">
          <label style="display:block; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-mid); margin-bottom:8px;">Description</label>
          <input
            type="text"
            name="description"
            value="{% if item_obj and item_obj.item_description %}{{ item_obj.item_description }}{% endif %}"
            placeholder="Enter item description"
            required
            style="width:100%; background:var(--cream); border:1.5px solid var(--border); border-radius:9px; padding:11px 14px; color:var(--text-dark); font-family:'Inter',sans-serif; font-size:13.5px; outline:none; transition:all 0.2s;"
            onfocus="this.style.borderColor='var(--navy)'; this.style.background='#fff'; this.style.boxShadow='0 0 0 3px rgba(15,32,68,0.06)'"
            onblur="this.style.borderColor='var(--border)'; this.style.background='var(--cream)'; this.style.boxShadow='none'"
          >
        </div>

        <!-- Image Upload -->
        <div style="margin-top:20px;">
          <label style="display:block; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-mid); margin-bottom:8px;">Item Image</label>
          {% if item_obj and item_obj.item_image %}
          <div style="margin-bottom:12px;">
            <img src="{{ item_obj.item_image.url }}" style="width:120px; height:90px; object-fit:cover; border-radius:10px; border:1.5px solid var(--border);">
          </div>
          {% endif %}
          <label style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:var(--cream); border:2px dashed var(--border); border-radius:12px; padding:32px; cursor:pointer; transition:all 0.2s;"
            onmouseover="this.style.borderColor='var(--navy)'; this.style.background='#f0f4ff'"
            onmouseout="this.style.borderColor='var(--border)'; this.style.background='var(--cream)'"
          >
            <div style="width:48px; height:48px; background:var(--navy); border-radius:12px; display:flex; align-items:center; justify-content:center;">
              <i class="bx bx-cloud-upload" style="font-size:24px; color:#fff;"></i>
            </div>
            <div style="font-size:13px; color:var(--text-mid); font-weight:500;">Click to upload or drag and drop</div>
            <div style="font-size:12px; color:var(--text-light);">PNG, JPG, WEBP up to 10MB</div>
            <input type="file" name="itemimage" id="itemimage" style="display:none;" accept="image/*" onchange="showFileName(this)">
          </label>
          <div id="fileName" style="font-size:12px; color:var(--success); margin-top:8px; display:none; font-weight:500;"></div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-top:20px;">
          <div>
            <label style="display:block; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-mid); margin-bottom:8px;">Start Price ($)</label>
            <input
              type="number"
              name="startprice"
              value="{% if item_obj and item_obj.item_start_price %}{{ item_obj.item_start_price }}{% endif %}"
              placeholder="0.00"
              required
              style="width:100%; background:var(--cream); border:1.5px solid var(--border); border-radius:9px; padding:11px 14px; color:var(--text-dark); font-family:'Inter',sans-serif; font-size:13.5px; outline:none; transition:all 0.2s;"
              onfocus="this.style.borderColor='var(--navy)'; this.style.background='#fff'; this.style.boxShadow='0 0 0 3px rgba(15,32,68,0.06)'"
              onblur="this.style.borderColor='var(--border)'; this.style.background='var(--cream)'; this.style.boxShadow='none'"
            >
          </div>

          <div>
            <label style="display:block; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-mid); margin-bottom:8px;">Start Date</label>
            <input
              type="date"
              name="startdate"
              value="{% if item_obj and item_obj.auction_start_date %}{{ item_obj.auction_start_date|date:'Y-m-d' }}{% endif %}"
              required
              style="width:100%; background:var(--cream); border:1.5px solid var(--border); border-radius:9px; padding:11px 14px; color:var(--text-dark); font-family:'Inter',sans-serif; font-size:13.5px; outline:none; transition:all 0.2s;"
              onfocus="this.style.borderColor='var(--navy)'; this.style.background='#fff'"
              onblur="this.style.borderColor='var(--border)'; this.style.background='var(--cream)'"
            >
          </div>

          <div>
            <label style="display:block; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-mid); margin-bottom:8px;">End Date</label>
            <input
              type="date"
              name="enddate"
              value="{% if item_obj and item_obj.auction_end_date %}{{ item_obj.auction_end_date|date:'Y-m-d' }}{% endif %}"
              required
              style="width:100%; background:var(--cream); border:1.5px solid var(--border); border-radius:9px; padding:11px 14px; color:var(--text-dark); font-family:'Inter',sans-serif; font-size:13.5px; outline:none; transition:all 0.2s;"
              onfocus="this.style.borderColor='var(--navy)'; this.style.background='#fff'"
              onblur="this.style.borderColor='var(--border)'; this.style.background='var(--cream)'"
            >
          </div>
        </div>

        <div style="margin-top:32px; display:flex; gap:12px; padding-top:24px; border-top:1px solid var(--border);">
          <button type="submit" class="btn-gold" style="padding:12px 36px; font-size:13px;">
            <i class="bx bx-check"></i> {% if item_obj %}Update Item{% else %}Add to Auction{% endif %}
          </button>
          <a href="{% url 'admin_auctions_list' %}" class="btn-outline-gold" style="padding:12px 24px; font-size:13px;">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function showFileName(input) {
  if (input.files && input.files[0]) {
    const el = document.getElementById('fileName');
    el.textContent = '✓ ' + input.files[0].name;
    el.style.display = 'block';
  }
}
</script>

{% endblock %}
