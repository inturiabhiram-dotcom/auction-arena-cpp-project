{% extends "user_home.html" %}

{% block content %}

<div style="max-width:560px;">
  <div class="page-header">
    <div>
      <div class="page-subtitle">Wallet</div>
      <h1 class="page-title">Add Credits</h1>
    </div>
  </div>

  <!-- Balance Card -->
  <div style="background:var(--navy); border-radius:16px; padding:32px; margin-bottom:24px; position:relative; overflow:hidden;">
    <div style="position:absolute; top:-60px; right:-60px; width:200px; height:200px; background:radial-gradient(circle, rgba(200,146,42,0.2) 0%, transparent 70%); border-radius:50%;"></div>
    <div style="position:absolute; bottom:-40px; left:40px; width:140px; height:140px; background:radial-gradient(circle, rgba(200,146,42,0.1) 0%, transparent 70%); border-radius:50%;"></div>

    <div style="position:relative; z-index:1;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
        <div style="width:38px; height:38px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); border-radius:9px; display:flex; align-items:center; justify-content:center;">
          <i class="bx bx-wallet-alt" style="font-size:18px; color:#fff;"></i>
        </div>
        <div style="font-size:12px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.5);">Current Balance</div>
      </div>

      <div style="font-family:'Playfair Display',serif; font-size:52px; font-weight:700; color:#fff; line-height:1;">
        {{ user_obj.user_credit }}
      </div>
      <div style="font-size:14px; color:rgba(255,255,255,0.45); margin-top:8px;">Credits available for bidding</div>
    </div>
  </div>

  <!-- Add Credits Form -->
  <div style="background:var(--warm-white); border:1px solid var(--border); border-radius:16px; padding:32px; box-shadow:var(--shadow-sm);">

    <div style="display:flex; align-items:center; gap:12px; margin-bottom:28px; padding-bottom:20px; border-bottom:1px solid var(--border);">
      <div style="width:38px; height:38px; background:var(--success-bg); border:1px solid rgba(26,122,74,0.2); border-radius:9px; display:flex; align-items:center; justify-content:center;">
        <i class="bx bx-plus-circle" style="font-size:19px; color:var(--success);"></i>
      </div>
      <div>
        <div style="font-size:14px; font-weight:700; color:var(--text-dark);">Top Up Wallet</div>
        <div style="font-size:12px; color:var(--text-light);">Credits are used to place bids on auctions</div>
      </div>
    </div>

    <form method="POST">
      {% csrf_token %}
      <div style="margin-bottom:24px;">
        <label style="display:block; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-mid); margin-bottom:10px;">Amount to Add</label>
        <div style="position:relative;">
          <span style="position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:18px; color:var(--accent); font-weight:700; line-height:1;">+</span>
          <input
            type="number"
            name="credits"
            id="credits"
            required
            autofocus
            min="1"
            style="width:100%; background:var(--cream); border:2px solid var(--border); border-radius:10px; padding:15px 15px 15px 42px; color:var(--text-dark); font-family:'Inter',sans-serif; font-size:20px; font-weight:700; outline:none; transition:all 0.2s;"
            placeholder="Enter amount"
            onfocus="this.style.borderColor='var(--navy)'; this.style.background='#fff'; this.style.boxShadow='0 0 0 3px rgba(15,32,68,0.07)'"
            onblur="this.style.borderColor='var(--border)'; this.style.background='var(--cream)'; this.style.boxShadow='none'"
          >
        </div>
      </div>

      <!-- Quick amounts -->
      <div style="margin-bottom:28px;">
        <div style="font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-light); margin-bottom:10px;">Quick Add</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          {% for amount in amounts %}
          <button type="button" onclick="document.getElementById('credits').value='{{ amount }}'"
            style="background:var(--cream); border:1.5px solid var(--border); border-radius:8px; padding:8px 18px; color:var(--text-mid); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s; font-family:'Inter',sans-serif;"
            onmouseover="this.style.background='var(--navy)'; this.style.color='#fff'; this.style.borderColor='var(--navy)'"
            onmouseout="this.style.background='var(--cream)'; this.style.color='var(--text-mid)'; this.style.borderColor='var(--border)'"
          >{{ amount }}</button>
          {% endfor %}
        </div>
      </div>

      <button type="submit" class="btn-gold" style="width:100%; justify-content:center; padding:14px; font-size:13px;">
        <i class="bx bx-wallet-alt"></i> Add Credits to Wallet
      </button>
    </form>
  </div>
</div>

{% endblock %}
